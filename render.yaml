services:
  - type: web
    name: telegram-migration-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: PHONE_NUMBER
        sync: false
      - key: SOURCE_GROUP
        sync: false
      - key: TARGET_GROUP
        sync: false
      - key: DELAY_BETWEEN_ADDS
        value: 60
      - key: MAX_MEMBERS_PER_SESSION
        value: 50
      - key: AUTO_START
        value: false
      - key: PYTHON_VERSION
        value: 3.11.0
